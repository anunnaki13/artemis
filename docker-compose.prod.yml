services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../ops/docker/Dockerfile.frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    networks: [aiq-net]
    depends_on: [backend]

  backend:
    build:
      context: ./backend
      dockerfile: ../ops/docker/Dockerfile.backend
    restart: unless-stopped
    env_file: .env.prod
    networks: [aiq-net]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [aiq-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks: [aiq-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [aiq-net]

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    env_file: .env.prod
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks: [aiq-net]

  loki:
    image: grafana/loki
    restart: unless-stopped
    volumes:
      - loki-data:/loki
    networks: [aiq-net]

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ops/certs:/etc/letsencrypt
    networks: [aiq-net]
    depends_on: [frontend, backend]

networks:
  aiq-net:

volumes:
  pgdata:
  prometheus-data:
  grafana-data:
  loki-data:

