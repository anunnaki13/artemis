services:
  backend:
    build:
      context: ./backend
      dockerfile: ../ops/docker/Dockerfile.backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./config:/app/config:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../ops/docker/Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_URL: http://103.150.197.225:8000/api
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
    ports:
      - "3066:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: aiq
      POSTGRES_PASSWORD: aiq
      POSTGRES_DB: aiq_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiq -d aiq_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

volumes:
  pgdata:
  frontend_node_modules:
